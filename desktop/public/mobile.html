<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0C1015" />
  <title>KaiCast — Coming soon</title>
  <link rel="icon" type="image/png" href="/kaicast-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0C1015;
      --surface0: #111518;
      --surface1: #181D22;
      --text1: #F8F8F8;
      --text2: rgba(248,248,248,0.70);
      --text3: rgba(248,248,248,0.44);
      --accent: #09A1FB;
      --excellent: #09A1FB;
      --great: #27D667;
      --good: #FFD321;
      --fair: #FF9D25;
      --nogo: #F73726;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text1);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      position: relative;
      overflow: hidden;
    }
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('/coming-soon-bg.png');
      background-size: cover;
      background-position: center;
      opacity: 0.18;
      filter: blur(2px);
      z-index: 0;
    }
    .bg-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(9,161,251,0.06) 0%, rgba(12,16,21,0.85) 60%, var(--bg) 100%);
      z-index: 1;
    }
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    .logo {
      width: 96px;
      height: 96px;
      object-fit: contain;
      filter: drop-shadow(0 0 24px rgba(9,161,251,0.4));
    }
    .wordmark {
      font-family: 'DM Sans', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text1);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(9,161,251,0.12);
      border: 1px solid rgba(9,161,251,0.28);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.2px;
      color: var(--accent);
    }
    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.4); }
    }
    h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 36px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.8px;
      color: var(--text1);
    }
    h1 .accent { color: var(--accent); }
    p.sub {
      font-size: 16px;
      line-height: 1.5;
      color: var(--text2);
      max-width: 340px;
    }
    .platforms {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .platform-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--surface0);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
    }
    .platform-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      color: var(--text1);
    }
    .platform-text {
      flex: 1;
      text-align: left;
    }
    .platform-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text1);
    }
    .platform-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.8px;
      color: var(--text3);
      margin-top: 2px;
    }
    .footer {
      position: absolute;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 2;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.8px;
      color: var(--text3);
    }
    .footer a {
      color: var(--text2);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="bg-overlay"></div>

  <div class="content">
    <img src="/kaicast-logo.png" alt="KaiCast" class="logo" />
    <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
      <div class="wordmark">KAICAST</div>
      <div class="badge">
        <span class="badge-dot"></span>
        <span>COMING SOON</span>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 14px; align-items: center;">
      <h1>The dive forecast<br/>for <span class="accent">Hawaii</span>.</h1>
      <p class="sub">Five-tier condition ratings, real-time buoy data, and community dive logs — built for divers across the islands.</p>
    </div>

    <div class="platforms">
      <div class="platform-row">
        <svg class="platform-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        <div class="platform-text">
          <div class="platform-name">iOS</div>
          <div class="platform-status">APP STORE · LAUNCHING SOON</div>
        </div>
      </div>
      <div class="platform-row">
        <svg class="platform-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17.523 15.341c-.547 0-.99-.443-.99-.99 0-.546.443-.989.99-.989.547 0 .99.443.99.989 0 .547-.443.99-.99.99zm-11.046 0c-.547 0-.99-.443-.99-.99 0-.546.443-.989.99-.989.547 0 .99.443.99.989 0 .547-.443.99-.99.99zm11.4-6.02l1.977-3.422a.412.412 0 00-.151-.564.412.412 0 00-.563.151l-2.005 3.473c-1.533-.7-3.255-1.09-5.135-1.09-1.88 0-3.602.39-5.135 1.09L4.86 5.486a.412.412 0 00-.563-.151.412.412 0 00-.151.564l1.977 3.422C2.732 11.205.5 14.563.5 18.42h23c0-3.857-2.232-7.215-5.623-9.099z"/></svg>
        <div class="platform-text">
          <div class="platform-name">Android</div>
          <div class="platform-status">PLAY STORE · LAUNCHING SOON</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span>On a desktop? </span>
    <a href="/?force=desktop">Open the web preview →</a>
  </div>

  <script>
    // If a desktop user lands here via a stale link, let them bounce out
    // by reloading the home with ?force=desktop set. The main index.html
    // honors that flag and skips its own mobile redirect.
  </script>
</body>
</html>
